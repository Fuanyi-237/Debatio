version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: debatio-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - debatio-network

  redis:
    image: redis:7-alpine
    container_name: debatio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - debatio-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: debatio-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://admin:password@mongodb:27017/debatio?authSource=admin
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=your-secret-key-change-in-production
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    networks:
      - debatio-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: debatio-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_TELEMETRY_DISABLED=1
    stdin_open: true
    tty: true
    depends_on:
      - backend
    networks:
      - debatio-network

volumes:
  mongodb_data:
  redis_data:

networks:
  debatio-network:
    driver: bridge
